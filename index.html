<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucent</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <header id="toolbar">
      <div class="group">
        <button id="btn-open" class="primary" title="Open file(s)">📂 Open</button>
        <button id="btn-next" title="Next file in folder">⏭ Next</button>
      </div>

      <div class="group">
        <button id="btn-toggle" title="Toggle rendered / raw">👁 Rendered</button>
        <button id="btn-search" title="Find (Cmd/Ctrl+F)" aria-label="Find">🔍 Find</button>
      </div>

      <div class="group">
        <select id="sel-viewas" title="View as">
          <option value="">View as…</option>
          <option value="markdown">Markdown</option>
          <option value="text">Plain text</option>
        </select>
        <select id="sel-font" title="Font family">
          <option value="sans">Sans</option>
          <option value="serif">Serif</option>
          <option value="mono">Mono</option>
        </select>
        <input id="inp-size" type="range" min="14" max="22" title="Font size" />
        <select id="sel-theme" title="Theme">
          <option value="light">Light</option>
          <option value="sepia">Sepia</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="spacer"></div>

      <div class="group">
        <button id="btn-copy-md" title="Copy as Markdown">📋 MD</button>
        <button id="btn-copy-rich" title="Copy as rich text">📋 Rich</button>
        <button id="btn-export-html" title="Export standalone HTML">📄 HTML</button>
        <button id="btn-export-pdf" title="Export PDF">🖨 PDF</button>
      </div>
    </header>

    <div id="tabstrip" hidden>
      <nav id="tabbar"></nav>
      <button id="btn-close-all" title="Close all tabs" aria-label="Close all tabs">✕</button>
    </div>

    <div id="searchbar" hidden role="search">
      <input id="search-input" type="text" placeholder="Find" aria-label="Find" />
      <button id="search-case" class="toggle" title="Match case" aria-pressed="false">Aa</button>
      <button id="search-regex" class="toggle" title="Regular expression" aria-pressed="false">.*</button>
      <span id="search-count" class="count">0/0</span>
      <button id="search-prev" title="Previous (Shift+Enter)" aria-label="Previous">▲</button>
      <button id="search-next" title="Next (Enter)" aria-label="Next">▼</button>
      <button id="search-close" title="Close (Esc)" aria-label="Close">✕</button>
    </div>
    <main id="content" data-theme="light" data-font="sans"></main>
    <div id="banner" hidden></div>
  </body>
</html>
