<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucent</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <header id="toolbar">
      <div class="group">
        <button id="btn-open" class="primary" title="Open file(s)">📂 Open</button>
        <button id="btn-next" title="Next file in folder">⏭ Next</button>
      </div>

      <div class="group">
        <button id="btn-toggle" title="Toggle rendered / raw">👁 Rendered</button>
      </div>

      <div class="group">
        <select id="sel-font" title="Font family">
          <option value="sans">Sans</option>
          <option value="serif">Serif</option>
          <option value="mono">Mono</option>
        </select>
        <input id="inp-size" type="range" min="14" max="22" title="Font size" />
        <select id="sel-theme" title="Theme">
          <option value="light">Light</option>
          <option value="sepia">Sepia</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="spacer"></div>

      <div class="group">
        <button id="btn-copy-md" title="Copy as Markdown">📋 MD</button>
        <button id="btn-copy-rich" title="Copy as rich text">📋 Rich</button>
        <button id="btn-export-html" title="Export standalone HTML">📄 HTML</button>
        <button id="btn-export-pdf" title="Export PDF">🖨 PDF</button>
      </div>
    </header>

    <div id="tabstrip" hidden>
      <nav id="tabbar"></nav>
      <button id="btn-close-all" title="Close all tabs" aria-label="Close all tabs">✕</button>
    </div>

    <main id="content" data-theme="light" data-font="sans"></main>
    <div id="banner" hidden></div>
  </body>
</html>
